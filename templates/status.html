<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وضعیت سرورها - iPBotS</title>
    <meta http-equiv="refresh" content="60">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Vazirmatn', sans-serif; background: #0f0f23; color: #fff; min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 8px; font-size: 24px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 14px; }
        .server { background: #1a1a2e; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; gap: 12px; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; }
        .online { background: #00c853; box-shadow: 0 0 8px #00c853; }
        .offline { background: #f44336; box-shadow: 0 0 8px #f44336; }
        .server-info { flex: 1; }
        .server-name { font-weight: 600; font-size: 15px; }
        .server-meta { color: #888; font-size: 12px; margin-top: 4px; }
        .ping { font-size: 13px; color: #00c853; }
        .footer { text-align: center; margin-top: 30px; color: #444; font-size: 12px; }
        .all-ok { text-align: center; padding: 20px; background: rgba(0,200,83,0.1); border-radius: 12px; margin-bottom: 20px; color: #00c853; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 وضعیت سرورها</h1>
        <p class="subtitle">بروزرسانی خودکار هر 60 ثانیه</p>
        <div id="servers">{{ servers_html }}</div>
        <div class="footer">© iPmart Network | آخرین بروزرسانی: {{ last_update }}</div>
    </div>
</body>
</html>
