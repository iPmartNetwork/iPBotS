<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطا در پرداخت - iPmart Network</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Vazirmatn', 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 400px;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 12px;
            color: #f44336;
        }
        p {
            font-size: 16px;
            color: #a0a0a0;
            margin-bottom: 8px;
        }
        .error-box {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            padding: 12px 16px;
            border-radius: 8px;
            margin: 16px 0;
            font-size: 14px;
            color: #ff8a80;
        }
        .btn {
            display: inline-block;
            margin-top: 24px;
            padding: 14px 32px;
            background: #6c63ff;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-outline {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            margin-right: 8px;
        }
        .actions {
            margin-top: 24px;
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .note {
            margin-top: 20px;
            font-size: 13px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">❌</div>
        <h1>پرداخت ناموفق</h1>
        <p>متأسفانه پرداخت شما انجام نشد.</p>

        <div class="error-box">
            {{ error_message }}
        </div>

        <p>مبلغی از حساب شما کسر نشده است.</p>

        <div class="actions">
            <a href="https://t.me/{{ bot_username }}" class="btn">
                🤖 بازگشت به ربات
            </a>
        </div>

        <p class="note">
            اگر مبلغی از حساب شما کسر شده، تا 72 ساعت<br>
            به حساب شما بازگردانده می‌شود.
        </p>
    </div>
</body>
</html>
